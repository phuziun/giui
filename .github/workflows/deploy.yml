name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token that can publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # tsc -b && vite build → dist/ (base /giui/)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The Pages backend intermittently answers "Deployment failed, try again
      # later" (error_count: 10) with a healthy artifact — hit 3x on 2026-07-04/05.
      # Try up to three times with growing pauses before failing for real.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 90
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: sleep 180
      - id: deployment-final
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
